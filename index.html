<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Compras Inteligente</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🛒 Lista de Compras</h1>
            <p>Encontre os melhores preços perto de você</p>
        </header>

        <section class="input-section">
            <div class="search-box">
                <input type="text" id="productInput" placeholder="Ex: Arroz, Feijão..." autocomplete="off">
                <button id="addBtn">Adicionar</button>
            </div>
            <div id="suggestions" class="suggestions"></div>
        </section>

        <main>
            <div class="shopping-list-container">
                <h2>Sua Lista</h2>
                <ul id="shoppingList" class="shopping-list">
                    <!-- Itens serão adicionados aqui -->
                </ul>
            </div>
        </main>
    </div>

    <!-- Firebase SDKs (v8 compatibility mode para simplicidade em Vanilla JS) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    
    <script src="js/firebase-config.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
